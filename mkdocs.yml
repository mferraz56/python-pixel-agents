site_name: Python Pixel Agents
site_description: Documentação do projeto python-pixel-agents
theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - "."
  - mermaid2

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Developer Guide: developer-guide.md
  - Reference:
      - app: reference/app.md
  - Observability: observability.md
  - Contributing: contributing.md
  - Viewer UI: viewer-ui.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
