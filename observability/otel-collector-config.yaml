receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 128
    spike_limit_mib: 32
  batch:

exporters:
  file/traces:
    path: /var/lib/otel/copilot-traces.jsonl
  file/metrics:
    path: /var/lib/otel/copilot-metrics.jsonl
  file/logs:
    path: /var/lib/otel/copilot-logs.jsonl
  otlp/aspire:
    endpoint: aspire-dashboard:18889
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/traces, otlp/aspire]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/metrics, otlp/aspire]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/logs, otlp/aspire]