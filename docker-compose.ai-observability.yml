services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    user: "0:0"
    command:
      - --config=/etc/otelcol/config.yaml
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - otel-data:/var/lib/otel
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - aspire-dashboard
    restart: unless-stopped

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    environment:
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      # Bind the OTLP gRPC receiver so the otel-collector's otlp/aspire exporter can connect.
      DOTNET_DASHBOARD_OTLP_ENDPOINT_URL: "http://0.0.0.0:18889"
      DOTNET_DASHBOARD_FRONTEND_BROWSERTOKEN: ""
    ports:
      - "18888:18888"
      - "18889:18889"
    restart: unless-stopped

volumes:
  otel-data: